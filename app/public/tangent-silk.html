<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tangent Silk — 一次扭转</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 280px; flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 22px; font-weight: 500;
            margin-bottom: 6px;
        }
        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 13px; margin-bottom: 28px; line-height: 1.5;
        }
        .control-section { margin-bottom: 28px; }
        .control-section h3 {
            font-size: 14px; font-weight: 600;
            margin-bottom: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .control-section h3::before {
            content: '•'; color: var(--anthropic-orange); font-weight: bold;
        }
        .control-group { margin-bottom: 16px; }
        .control-group label {
            display: block; font-size: 13px; font-weight: 500;
            margin-bottom: 6px;
        }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] {
            flex: 1; height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px; outline: none;
            -webkit-appearance: none;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            background: var(--anthropic-orange);
            border-radius: 50%; cursor: pointer;
        }
        .slider-container input[type="range"]::-moz-range-thumb {
            width: 14px; height: 14px;
            background: var(--anthropic-orange);
            border-radius: 50%; border: none; cursor: pointer;
        }
        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 11px; color: var(--anthropic-mid-gray);
            min-width: 42px; text-align: right;
        }
        .color-group { margin-bottom: 12px; }
        .color-group label {
            display: block; font-size: 11px;
            color: var(--anthropic-mid-gray); margin-bottom: 4px;
        }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] {
            width: 28px; height: 28px; border: none;
            border-radius: 6px; cursor: pointer;
            background: none; padding: 0;
        }
        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 11px; color: var(--anthropic-mid-gray);
        }
        .button {
            background: var(--anthropic-orange); color: white;
            border: none; padding: 10px 16px;
            border-radius: 6px; font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.2s ease; width: 100%;
        }
        .button:hover { background: #c86641; }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area {
            flex: 1; display: flex;
            align-items: center; justify-content: center; min-width: 0;
        }
        #canvas-container {
            width: 100%; max-width: 1100px;
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.15);
            background: #ffffff;
        }
        #canvas-container canvas {
            display: block;
            width: 100% !important; height: auto !important;
            cursor: grab;
        }
        #canvas-container canvas.grabbing { cursor: grabbing; }
        .hint {
            font-size: 11px; color: var(--anthropic-mid-gray);
            font-style: italic; line-height: 1.5;
            padding: 8px 10px; background: var(--anthropic-light);
            border-radius: 6px; margin-bottom: 6px;
        }
        @media (max-width: 600px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Tangent Silk</h1>
            <div class="subtitle">两条线段 + 反向连接 = 一次扭转。肉眼看到的曲线，其实全是直线。</div>

            <div class="control-section">
                <h3>Handles</h3>
                <div class="hint">在画布上直接拖动四个端点即可改变构图。蓝点 = source，紫点 = target。</div>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Line Count</label>
                    <div class="slider-container">
                        <input type="range" id="lineCount" min="10" max="400" step="5" value="80" oninput="updateParam('lineCount', this.value)">
                        <span class="value-display" id="lineCount-value">80</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Twist Warp</label>
                    <div class="slider-container">
                        <input type="range" id="warp" min="0.3" max="3.0" step="0.05" value="1.0" oninput="updateParam('warp', this.value)">
                        <span class="value-display" id="warp-value">1.00</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Stroke Weight</label>
                    <div class="slider-container">
                        <input type="range" id="strokeW" min="0.2" max="2.5" step="0.05" value="0.75" oninput="updateParam('strokeW', this.value)">
                        <span class="value-display" id="strokeW-value">0.75</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Line Alpha</label>
                    <div class="slider-container">
                        <input type="range" id="alpha" min="40" max="255" step="5" value="170" oninput="updateParam('alpha', this.value)">
                        <span class="value-display" id="alpha-value">170</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>
                <div class="color-group">
                    <label>Background</label>
                    <div class="color-picker-container">
                        <input type="color" id="bgColor" value="#ffffff" onchange="updateColor('bgColor', this.value)">
                        <span class="color-value" id="bgColor-value">#ffffff</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Gradient Start</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorStart" value="#5b8bc9" onchange="updateColor('colorStart', this.value)">
                        <span class="color-value" id="colorStart-value">#5b8bc9</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Gradient End</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorEnd" value="#9b7cd0" onchange="updateColor('colorEnd', this.value)">
                        <span class="color-value" id="colorEnd-value">#9b7cd0</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetAll()">Reset</button>
                    <button class="button secondary" onclick="downloadPng()">Download</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container"></div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════════
        // TANGENT SILK — A single twist.
        // Source = short segment (s1 → s2). Target = long segment (t1 → t2).
        // For each t in [0,1]: draw a straight line from A(t) on source to
        // B(1-t) on target. Reversed mapping is what "twists" the strands and
        // produces the parabolic envelope the eye reads as a curve.
        // ═══════════════════════════════════════════════════════════════════════

        const CANVAS_W = 1400;
        const CANVAS_H = 900;

        // Default layout — matches the editorial cover composition.
        const DEFAULTS = {
            s1: { x: 240, y: 250 },
            s2: { x: 240, y: 430 },
            t1: { x: 1320, y: 120 },
            t2: { x: 1300, y: 860 },
            lineCount: 80,
            warp: 1.0,
            strokeW: 0.75,
            alpha: 170,
            bgColor: '#ffffff',
            colorStart: '#5b8bc9',
            colorEnd: '#9b7cd0'
        };

        let state = JSON.parse(JSON.stringify(DEFAULTS));
        let draggingKey = null;
        const HANDLE_R = 11;

        function setup() {
            const canvas = createCanvas(CANVAS_W, CANVAS_H);
            canvas.parent('canvas-container');
            render();
        }

        function draw() {}

        function render() {
            background(state.bgColor);

            const cS = color(state.colorStart);
            const cE = color(state.colorEnd);
            const N = state.lineCount;

            strokeWeight(state.strokeW);
            noFill();

            for (let i = 0; i < N; i++) {
                const t = (N === 1) ? 0.5 : i / (N - 1);

                // Source walks s1 → s2 linearly
                const ax = state.s1.x + (state.s2.x - state.s1.x) * t;
                const ay = state.s1.y + (state.s2.y - state.s1.y) * t;

                // Target walks t2 → t1 with warp (reversed + power)
                const tm = Math.pow(1 - t, state.warp);
                const bx = state.t1.x + (state.t2.x - state.t1.x) * tm;
                const by = state.t1.y + (state.t2.y - state.t1.y) * tm;

                const col = lerpColor(cS, cE, t);
                col.setAlpha(state.alpha);
                stroke(col);

                line(ax, ay, bx, by);
            }

            // Draw handles on top
            drawHandle(state.s1, '#5b8bc9', 'S1');
            drawHandle(state.s2, '#5b8bc9', 'S2');
            drawHandle(state.t1, '#9b7cd0', 'T1');
            drawHandle(state.t2, '#9b7cd0', 'T2');
        }

        function drawHandle(p, col, label) {
            noStroke();
            fill(255, 230);
            circle(p.x, p.y, HANDLE_R * 2 + 2);
            stroke(col);
            strokeWeight(2);
            fill(col + '66'); // translucent fill
            circle(p.x, p.y, HANDLE_R * 2);
            noStroke();
            fill(40);
            textSize(11);
            textAlign(LEFT, CENTER);
            text(label, p.x + HANDLE_R + 6, p.y - 1);
        }

        // ─── Drag handles ────────────────────────────────────────────────────

        function canvasMouse() {
            const c = document.querySelector('#canvas-container canvas');
            const rect = c.getBoundingClientRect();
            return {
                x: (mouseX) * (CANVAS_W / rect.width),
                y: (mouseY) * (CANVAS_H / rect.height)
            };
        }

        function mousePressed() {
            const c = document.querySelector('#canvas-container canvas');
            if (!c) return;
            const m = canvasMouse();
            for (const k of ['s1', 's2', 't1', 't2']) {
                const p = state[k];
                const dx = m.x - p.x, dy = m.y - p.y;
                if (dx * dx + dy * dy < (HANDLE_R * 2.2) * (HANDLE_R * 2.2)) {
                    draggingKey = k;
                    c.classList.add('grabbing');
                    return;
                }
            }
        }

        function mouseDragged() {
            if (!draggingKey) return;
            const m = canvasMouse();
            state[draggingKey].x = constrain(m.x, 0, CANVAS_W);
            state[draggingKey].y = constrain(m.y, 0, CANVAS_H);
            render();
        }

        function mouseReleased() {
            draggingKey = null;
            const c = document.querySelector('#canvas-container canvas');
            if (c) c.classList.remove('grabbing');
        }

        // ─── UI ──────────────────────────────────────────────────────────────

        function updateParam(name, value) {
            const num = parseFloat(value);
            state[name] = (name === 'lineCount' || name === 'alpha') ? parseInt(value) : num;
            const span = document.getElementById(name + '-value');
            if (span) {
                if (['warp', 'strokeW'].includes(name)) span.textContent = num.toFixed(2);
                else span.textContent = state[name];
            }
            render();
        }

        function updateColor(name, value) {
            state[name] = value;
            const span = document.getElementById(name + '-value');
            if (span) span.textContent = value;
            render();
        }

        function resetAll() {
            state = JSON.parse(JSON.stringify(DEFAULTS));
            document.getElementById('lineCount').value = state.lineCount;
            document.getElementById('lineCount-value').textContent = state.lineCount;
            document.getElementById('warp').value = state.warp;
            document.getElementById('warp-value').textContent = state.warp.toFixed(2);
            document.getElementById('strokeW').value = state.strokeW;
            document.getElementById('strokeW-value').textContent = state.strokeW.toFixed(2);
            document.getElementById('alpha').value = state.alpha;
            document.getElementById('alpha-value').textContent = state.alpha;
            for (const c of ['bgColor', 'colorStart', 'colorEnd']) {
                document.getElementById(c).value = state[c];
                document.getElementById(c + '-value').textContent = state[c];
            }
            render();
        }

        function downloadPng() {
            saveCanvas('tangent-silk', 'png');
        }
    </script>
</body>
</html>
