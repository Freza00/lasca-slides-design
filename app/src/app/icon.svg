<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#f0e6d3"/>
  <!-- Minimal-line bull: the whole figure in ~6 essential strokes.
       Maximum meaning, minimum lines. -->
  <g fill="none" stroke="#A85432" stroke-linecap="round" stroke-linejoin="round">
    <!-- One continuous body line: horn → head → back → rump → hind leg -->
    <path d="M7,7 Q5,5 4,7 Q3,9 5,10 Q7,11 9,10 Q12,8 16,7 Q20,6.5 23,8 Q26,10 26,14 Q26,17 24,19 L24,25" stroke-width="2"/>
    <!-- Front leg -->
    <path d="M12,14 L11,25" stroke-width="2"/>
    <!-- Belly line connecting legs -->
    <path d="M11,17 Q16,19 24,17" stroke-width="1.2"/>
    <!-- Second horn -->
    <path d="M5,8 Q4,5 6,5" stroke-width="1.5"/>
    <!-- Tail flick -->
    <path d="M26,13 Q28,11 29,9" stroke-width="1.5"/>
    <!-- Eye dot -->
    <circle cx="6.5" cy="9" r="0.8" fill="#A85432"/>
  </g>
</svg>
