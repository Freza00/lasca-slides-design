                  </div>
                  <button
                    onClick={() => sendChat('global')}
                    disabled={!chatInput.trim()}
                    style={{
                      background: chatInput.trim() ? '#141413' : '#e8e6dc',
                      border: 'none', borderRadius: 8, padding: '5px 14px',
                      fontSize: 12, fontWeight: 500, fontFamily: 'inherit',
                      color: chatInput.trim() ? '#fff' : '#b0aea5',
                      cursor: chatInput.trim() ? 'pointer' : 'default',
                      transition: 'background 0.2s',
                    }}
                  >
                    全部 ↵
                  </button>
                </div>
              </div>
              <div style={{ fontSize: 10, color: '#b0aea5', marginTop: 6, textAlign: 'center' }}>
                Enter 换行 · Cmd+Enter 发送
              </div>
            </div>
          </div>

          </div>{/* close Main Body */}
        </div>
      );
    }

    // ========================================================================
    // PRESENTATION MODE — laser pointer, pen, slide transitions
    // ========================================================================
    const PresentationMode = React.forwardRef(({ slides, currentIndex, onIndexChange, onExit, presMode }, ref) => {
      const containerRef = useRef(null);
      const canvasRef2 = useRef(null);
      const leftPanelRef = useRef(null);
      const [tool, setTool] = useState('pointer');
      const [penColor, setPenColor] = useState('#d97757');
      const [isDrawing, setIsDrawing] = useState(false);
      const [laserPos, setLaserPos] = useState(null);
      const [showControls, setShowControls] = useState(false);
      const [prevIndex, setPrevIndex] = useState(null);
      const [elapsedTime, setElapsedTime] = useState(0);
      const [fullScale, setFullScale] = useState(1);
      const [presenterScale, setPresenterScale] = useState(1);
      const strokesRef = useRef([]);
      const currentStroke = useRef([]);
      const hideTimer = useRef(null);
      const clickStartRef = useRef(null);
      const startTimeRef = useRef(Date.now());

      // Extract speaker notes from slide HTML
      const extractNotes = (html) => {
        const match = html.match(/<aside[^>]*class="notes"[^>]*>([\s\S]*?)<\/aside>/i);
        return match ? match[1].replace(/<[^>]+>/g, '').trim() : '';
      };

      React.useImperativeHandle(ref, () => containerRef.current);

      // Track previous index
      const prevIdxRef = useRef(currentIndex);
      useEffect(() => {
        setPrevIndex(prevIdxRef.current);
        prevIdxRef.current = currentIndex;
        strokesRef.current = [];
        if (canvasRef2.current) {
          const ctx = canvasRef2.current.getContext('2d');
          ctx.clearRect(0, 0, canvasRef2.current.width, canvasRef2.current.height);
        }
      }, [currentIndex]);

      // Staggered child animations — only animate translateY (NEVER touch opacity — that causes black flash)
      // Find meaningful children to animate (skip style elements, skip single-child wrappers)
      const getMeaningfulChildren = (el) => {
        if (!el) return [];
        let children = Array.from(el.children).filter(c =>
          c.tagName !== 'STYLE' && c.tagName !== 'SCRIPT' &&
          getComputedStyle(c).display !== 'none'
        );
        // If there's only 1 visible child, go deeper (it's probably a wrapper)
        while (children.length === 1 && children[0].children.length > 0) {
          children = Array.from(children[0].children).filter(c =>
            c.tagName !== 'STYLE' && c.tagName !== 'SCRIPT' &&
            getComputedStyle(c).display !== 'none'
          );
        }
        return children;
      };

      useLayoutEffect(() => {
        const activeSlide = containerRef.current?.querySelector(`[data-slide-idx="${currentIndex}"]`);
        if (!activeSlide) return;
        const inner = activeSlide.querySelector('[data-slide-inner]');
        if (!inner) return;
        const scaleWrapper = inner.firstElementChild; // the scale wrapper (CANVAS_W container)
        if (!scaleWrapper) return;
        const contentRoot = scaleWrapper.firstElementChild; // the actual slide content root
        const children = getMeaningfulChildren(contentRoot || scaleWrapper);

        // Reset: push children down, no transition
        children.forEach(child => {
          child.style.transform = 'translateY(16px)';
          child.style.transition = 'none';
        });

        // After paint: stagger slide-up
        let raf1, raf2;
        raf1 = requestAnimationFrame(() => {
          raf2 = requestAnimationFrame(() => {
            children.forEach((child, i) => {
              child.style.transition = `transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1) ${i * 0.07}s`;
              child.style.transform = 'translateY(0)';
            });
          });
        });
        return () => { cancelAnimationFrame(raf1); cancelAnimationFrame(raf2); };
      }, [currentIndex]);

      // Fullscreen (only for full mode, not presenter mode)
      useEffect(() => {
        if (presMode === 'full') {
          containerRef.current?.requestFullscreen?.();
          const onFs = () => { if (!document.fullscreenElement) onExit(); };
          document.addEventListener('fullscreenchange', onFs);
          return () => document.removeEventListener('fullscreenchange', onFs);
        }
      }, [presMode, onExit]);

      // Compute fullScale for full-screen mode
      useEffect(() => {
        if (presMode !== 'full') return;
        const updateScale = () => {
          setFullScale(Math.min(window.innerWidth / CANVAS_W, window.innerHeight / CANVAS_H));
        };
        updateScale();
        window.addEventListener('resize', updateScale);
        return () => window.removeEventListener('resize', updateScale);
      }, [presMode]);

      // Compute presenterScale for presenter mode's left panel
      useEffect(() => {
        if (presMode !== 'presenter' || !leftPanelRef.current) return;
        const updateScale = () => {
          const rect = leftPanelRef.current.getBoundingClientRect();
          setPresenterScale(Math.min(rect.width / CANVAS_W, rect.height / CANVAS_H));
        };
        updateScale();
        window.addEventListener('resize', updateScale);
        const ro = new ResizeObserver(updateScale);
        ro.observe(leftPanelRef.current);
        return () => { window.removeEventListener('resize', updateScale); ro.disconnect(); };
      }, [presMode]);

      const goNext = () => { if (currentIndex < slides.length - 1) onIndexChange(currentIndex + 1); };
      const goPrev = () => { if (currentIndex > 0) onIndexChange(currentIndex - 1); };

      // Keyboard
      useEffect(() => {
        const handler = (e) => {
          if (e.key === 'Escape') { onExit(); return; }
          if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); goNext(); }
          else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goPrev(); }
          else if (e.key === 'p' || e.key === 'P') { setTool(t => t === 'pen' ? 'pointer' : 'pen'); }
          else if (e.key === 'l' || e.key === 'L') { setTool('pointer'); }
          else if (e.key === 'c' || e.key === 'C') { strokesRef.current = []; redrawCanvas(); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [currentIndex, slides.length]);

      // Mouse — pointer, pen, left-click advance
      const getCanvasPos = (e) => {
        const rect = canvasRef2.current?.getBoundingClientRect();
        if (!rect) return null;
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      };

      const handleMouseMove = (e) => {
        const pos = getCanvasPos(e);
        if (!pos) return;
        if (e.clientY > window.innerHeight - 60) {
          setShowControls(true); clearTimeout(hideTimer.current);
        } else if (showControls) {
          clearTimeout(hideTimer.current);
          hideTimer.current = setTimeout(() => setShowControls(false), 2000);
        }
        if (tool === 'pointer') setLaserPos(pos);
        if (tool === 'pen' && isDrawing) { currentStroke.current.push(pos); redrawCanvas(); }
      };

      const handleMouseDown = (e) => {
        clickStartRef.current = { x: e.clientX, y: e.clientY, time: Date.now() };
        if (tool === 'pen') { setIsDrawing(true); currentStroke.current = [getCanvasPos(e)]; }
      };

      const handleMouseUp = (e) => {
        if (tool === 'pen' && isDrawing) {
          setIsDrawing(false);
          if (currentStroke.current.length > 1) strokesRef.current.push({ points: [...currentStroke.current], color: penColor, width: 3 });
          currentStroke.current = [];
        }
        // Left-click advance: only if it was a short, stationary click (not a drag or long press)
        if (tool === 'pointer' && clickStartRef.current && e.button === 0) {
          const dx = Math.abs(e.clientX - clickStartRef.current.x);
          const dy = Math.abs(e.clientY - clickStartRef.current.y);
          const dt = Date.now() - clickStartRef.current.time;
          // Short click, barely moved, not on control bar
          if (dx < 5 && dy < 5 && dt < 400 && e.clientY < window.innerHeight - 60) {
            goNext();
          }
        }
        clickStartRef.current = null;
      };

      const handleMouseLeave = () => { setLaserPos(null); if (isDrawing) handleMouseUp({ button: -1, clientX: 0, clientY: 0 }); };

      // Right-click to go back
      const handleContextMenu = (e) => {
        e.preventDefault();
        goPrev();
      };

      const redrawCanvas = () => {
        const canvas = canvasRef2.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const drawStroke = (s) => { ctx.beginPath(); ctx.strokeStyle = s.color; ctx.lineWidth = s.width; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; s.points.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y)); ctx.stroke(); };
        strokesRef.current.forEach(drawStroke);
        if (currentStroke.current.length > 1) drawStroke({ points: currentStroke.current, color: penColor, width: 3 });
      };

      useEffect(() => {
        const resize = () => {
          if (!canvasRef2.current) return;
          if (presMode === 'presenter') {
            const slideContainer = canvasRef2.current.closest('div[style*="position: relative"]');
            if (slideContainer) {
              const rect = slideContainer.getBoundingClientRect();
              canvasRef2.current.width = rect.width;
              canvasRef2.current.height = rect.height;
            }
          } else {
            canvasRef2.current.width = window.innerWidth;
            canvasRef2.current.height = window.innerHeight;
          }
        };
        resize(); window.addEventListener('resize', resize);
        return () => window.removeEventListener('resize', resize);
      }, [presMode]);

      // Timer for presenter mode
      useEffect(() => {
        if (presMode !== 'presenter') return;
        const interval = setInterval(() => {
          setElapsedTime(Math.floor((Date.now() - startTimeRef.current) / 1000));
        }, 100);
        return () => clearInterval(interval);
      }, [presMode]);

      const goingForward = prevIndex !== null ? currentIndex > prevIndex : true;
      const cursorStyle = tool === 'pen' ? 'crosshair' : 'none';

      const formatTime = (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins}:${secs.toString().padStart(2, '0')}`;
      };

      // Presenter mode layout
      if (presMode === 'presenter') {
        const nextIdx = currentIndex + 1;
        const hasNext = nextIdx < slides.length;
        const nextSlide = hasNext ? slides[nextIdx] : null;

        return (
          <div
            ref={containerRef}
            style={{
              display: 'grid',
              gridTemplateColumns: '1fr 340px',
              gap: 16,
              padding: 16,
              background: '#202020',
              width: '100vw',
              height: '100vh',
              overflow: 'hidden',
              fontFamily: 'Poppins, sans-serif',
              color: '#fff',
            }}
          >
            {/* Left: Current slide */}
            <div
              ref={leftPanelRef}
              style={{
                position: 'relative',
                borderRadius: 8,
                overflow: 'hidden',
                background: '#f0efe9',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
              }}
              onMouseMove={handleMouseMove}
              onMouseDown={handleMouseDown}
              onMouseUp={handleMouseUp}
              onMouseLeave={handleMouseLeave}
              onContextMenu={handleContextMenu}
            >
              {/* Slide content */}
              {slides.map((slide, idx) => {
                const isActive = idx === currentIndex;
                const isPrev = idx === prevIndex;
                const isFirst = prevIndex === null;

                let style;
                if (isActive) {
                  style = {
                    opacity: 1,
                    filter: 'none',
                    transform: 'scale(1)',
                    transition: isFirst ? 'none' : 'opacity 0.7s cubic-bezier(0.22, 0.61, 0.36, 1)',
                    zIndex: 10,
                  };
                } else if (isPrev) {
                  style = {
                    opacity: 0,
                    filter: 'blur(12px) brightness(1.05)',
                    transform: 'scale(1.02)',
                    transition: 'opacity 0.8s cubic-bezier(0.22, 0.61, 0.36, 1), filter 0.6s ease-out, transform 0.8s ease-out',
                    zIndex: 5,
                  };
                } else {
                  style = { opacity: 0, filter: 'none', transform: 'scale(1)', transition: 'none', zIndex: 1 };
                }

                return (
                  <div key={slide.id} data-slide-idx={idx} style={{
                    position: 'absolute', top: 0, left: 0, width: '100%', height: '100%',
                    ...style,
                    pointerEvents: isActive ? 'auto' : 'none',
                  }}>
                    <div data-slide-inner="true" style={{ width: '100%', height: '100%', overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                      <div style={{
                        width: CANVAS_W,
                        height: CANVAS_H,
                        transform: `scale(${presenterScale})`,
                        transformOrigin: 'center center',
                        flexShrink: 0,
                        overflow: 'hidden',
                      }} dangerouslySetInnerHTML={{ __html: slide.html }} />
                    </div>
                  </div>
                );
              })}

              {/* Drawing overlay */}
              <canvas ref={canvasRef2} style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', pointerEvents: tool === 'pen' ? 'auto' : 'none', zIndex: 20 }} />

              {/* Laser pointer */}
              {tool === 'pointer' && laserPos && (
                <div style={{
                  position: 'absolute', left: laserPos.x - 8, top: laserPos.y - 8,
                  width: 16, height: 16, borderRadius: '50%',
                  background: 'radial-gradient(circle, #ff3333 30%, rgba(255,50,50,0.4) 70%, transparent 100%)',
                  boxShadow: '0 0 12px 4px rgba(255,50,50,0.5)',
                  pointerEvents: 'none', zIndex: 30,
                }} />
              )}
            </div>

            {/* Right panel: Next slide preview, timer, controls */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {/* Next slide preview */}
              <div style={{
                width: 320,
                height: 180,
                background: '#222',
                borderRadius: 8,
                overflow: 'hidden',
                border: '1px solid #333',
                position: 'relative',
                flexShrink: 0,
              }}>
                {hasNext ? (
                  <div style={{
                    width: CANVAS_W,
                    height: CANVAS_H,
                    transform: `scale(${320 / CANVAS_W})`,
                    transformOrigin: '0 0',
                    overflow: 'hidden',
                    position: 'absolute',
                    top: 0,
                    left: 0,
                  }} dangerouslySetInnerHTML={{ __html: nextSlide.html }} />
                ) : (
                  <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <span style={{ color: '#666', fontSize: 13 }}>最后一页</span>
                  </div>
                )}
              </div>

              {/* Page counter */}
              <div style={{ textAlign: 'center', fontSize: 13, color: '#aaa' }}>
                {currentIndex + 1} / {slides.length}
              </div>

              {/* Timer */}
              <div style={{ textAlign: 'center', fontSize: 28, fontWeight: 700, fontFamily: 'monospace', color: '#d97757' }}>
                {formatTime(elapsedTime)}
              </div>

              {/* Speaker Notes */}
              <div style={{
                flex: '1 1 auto',
                background: '#222',
                borderRadius: 8,
                padding: '12px 14px',
                fontSize: 14,
                lineHeight: 1.6,
                color: '#ccc',
                overflowY: 'auto',
                border: '1px solid #333',
                minHeight: 80,
              }}>
                <div style={{ fontSize: 11, color: '#888', marginBottom: 6, textTransform: 'uppercase', letterSpacing: 1 }}>Speaker Notes</div>
                {extractNotes(slides[currentIndex].html) || <span style={{ color: '#555', fontStyle: 'italic' }}>No notes for this slide</span>}
              </div>

              {/* Controls */}
              <div style={{ display: 'flex', gap: 8, flexDirection: 'column' }}>
                <button onClick={(e) => { e.stopPropagation(); goPrev(); }} style={{ ...presBtn, background: '#444', color: '#fff', padding: '8px 12px', fontSize: 13 }}>◀ Prev</button>
                <button onClick={(e) => { e.stopPropagation(); goNext(); }} style={{ ...presBtn, background: '#444', color: '#fff', padding: '8px 12px', fontSize: 13 }}>Next ▶</button>
                <button onClick={(e) => { e.stopPropagation(); onExit(); }} style={{ ...presBtn, background: '#555', color: '#fff', padding: '8px 12px', fontSize: 13 }}>Exit</button>
              </div>
            </div>
          </div>
        );
      }

      // Full screen mode (original layout)
      return (
        <div
          ref={containerRef}
          onMouseMove={handleMouseMove}
          onMouseDown={handleMouseDown}
          onMouseUp={handleMouseUp}
          onMouseLeave={handleMouseLeave}
          onContextMenu={handleContextMenu}
          style={{ width: '100vw', height: '100vh', background: '#f0efe9', position: 'relative', overflow: 'hidden', cursor: cursorStyle }}
        >
          {/* All slides layered — new slide on top, old slide blurs out (diffusion dissolve) */}
          {slides.map((slide, idx) => {
            const isActive = idx === currentIndex;
            const isPrev = idx === prevIndex;
            const isFirst = prevIndex === null;

            let style;
            if (isActive) {
              style = {
                opacity: 1,
                filter: 'none',
                transform: 'scale(1)',
                transition: isFirst ? 'none' : 'opacity 0.7s cubic-bezier(0.22, 0.61, 0.36, 1)',
                zIndex: 10,
              };
            } else if (isPrev) {
              // Old slide: blur + subtle zoom out = diffusion dissolve
              style = {
                opacity: 0,
                filter: 'blur(12px) brightness(1.05)',
                transform: 'scale(1.02)',
                transition: 'opacity 0.8s cubic-bezier(0.22, 0.61, 0.36, 1), filter 0.6s ease-out, transform 0.8s ease-out',
                zIndex: 5,
              };
            } else {
              style = { opacity: 0, filter: 'none', transform: 'scale(1)', transition: 'none', zIndex: 1 };
            }

            return (
              <div key={slide.id} data-slide-idx={idx} style={{
                position: 'absolute', top: 0, left: 0, width: '100%', height: '100%',
                ...style,
                pointerEvents: isActive ? 'auto' : 'none',
              }}>
                <div data-slide-inner="true" style={{ width: '100%', height: '100%', overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <div style={{
                    width: CANVAS_W,
                    height: CANVAS_H,
                    transform: `scale(${fullScale})`,
                    transformOrigin: 'center center',
                    flexShrink: 0,
                    overflow: 'hidden',
                  }} dangerouslySetInnerHTML={{ __html: slide.html }} />
                </div>
              </div>
            );
          })}

          {/* Drawing overlay */}
          <canvas ref={canvasRef2} style={{ position: 'fixed', top: 0, left: 0, width: '100vw', height: '100vh', pointerEvents: tool === 'pen' ? 'auto' : 'none', zIndex: 20 }} />

          {/* Laser pointer */}
          {tool === 'pointer' && laserPos && (
            <div style={{
              position: 'fixed', left: laserPos.x - 8, top: laserPos.y - 8,
              width: 16, height: 16, borderRadius: '50%',
              background: 'radial-gradient(circle, #ff3333 30%, rgba(255,50,50,0.4) 70%, transparent 100%)',
              boxShadow: '0 0 12px 4px rgba(255,50,50,0.5)',
              pointerEvents: 'none', zIndex: 30,
            }} />
          )}

          {/* SVG filter for arrow glow (visible on any background) */}
          <svg style={{ position: 'absolute', width: 0, height: 0 }}>
            <defs>
              <filter id="arrow-glow" x="-50%" y="-50%" width="200%" height="200%">
                <feDropShadow dx="0" dy="0" stdDeviation="3" floodColor="rgba(255,255,255,0.8)" />
              </filter>
            </defs>
          </svg>

          {/* Floating navigation arrows — reveal.js style */}
          {/* Left arrow (previous) */}
          {currentIndex > 0 && (
            <div
              onClick={(e) => { e.stopPropagation(); goPrev(); }}
              className="nav-arrow nav-arrow-left"
              style={{
                position: 'fixed', left: 20, top: '50%', transform: 'translateY(-50%)',
                zIndex: 40, cursor: 'pointer', padding: 12,
                opacity: 0.5, transition: 'opacity 0.3s ease, transform 0.3s ease',
              }}
              onMouseEnter={(e) => { e.currentTarget.style.opacity = '0.85'; e.currentTarget.style.transform = 'translateY(-50%) scale(1.15)'; }}
              onMouseLeave={(e) => { e.currentTarget.style.opacity = '0.5'; e.currentTarget.style.transform = 'translateY(-50%) scale(1)'; }}
            >
              <svg width="40" height="60" viewBox="0 0 40 60" fill="none">
                <path d="M30 5L10 30L30 55" stroke="rgba(0,0,0,0.35)" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" filter="url(#arrow-glow)"/>
              </svg>
            </div>
          )}

          {/* Right arrow (next) */}
          {currentIndex < slides.length - 1 && (
            <div
              onClick={(e) => { e.stopPropagation(); goNext(); }}
              className="nav-arrow nav-arrow-right"
              style={{
                position: 'fixed', right: 20, top: '50%', transform: 'translateY(-50%)',
                zIndex: 40, cursor: 'pointer', padding: 12,
                opacity: 0.5, transition: 'opacity 0.3s ease, transform 0.3s ease',
              }}
              onMouseEnter={(e) => { e.currentTarget.style.opacity = '0.85'; e.currentTarget.style.transform = 'translateY(-50%) scale(1.15)'; }}
              onMouseLeave={(e) => { e.currentTarget.style.opacity = '0.5'; e.currentTarget.style.transform = 'translateY(-50%) scale(1)'; }}
            >
              <svg width="40" height="60" viewBox="0 0 40 60" fill="none">
                <path d="M10 5L30 30L10 55" stroke="rgba(0,0,0,0.35)" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" filter="url(#arrow-glow)"/>
              </svg>
            </div>
          )}

          {/* Bottom-right floating tools — compact pill */}
          <div style={{
            position: 'fixed', bottom: 20, right: 24,
            display: 'flex', alignItems: 'center', gap: 4,
            background: 'rgba(0,0,0,0.45)', backdropFilter: 'blur(8px)',
            borderRadius: 20, padding: '4px 10px',
            opacity: showControls ? 0.9 : 0.2,
            transition: 'opacity 0.3s ease',
            zIndex: 40, fontFamily: 'Poppins, sans-serif',
          }}
            onMouseEnter={(e) => { e.currentTarget.style.opacity = '0.9'; }}
            onMouseLeave={(e) => { if (!showControls) e.currentTarget.style.opacity = '0.2'; }}
          >
            <span style={{ color: 'rgba(255,255,255,0.7)', fontSize: 12, padding: '0 6px' }}>{currentIndex + 1}/{slides.length}</span>
            <div style={{ width: 1, height: 14, background: 'rgba(255,255,255,0.2)' }} />
            <button onClick={(e) => { e.stopPropagation(); setTool('pointer'); }} style={{ ...presBtn, fontSize: 11, padding: '3px 6px', background: tool === 'pointer' ? 'rgba(255,255,255,0.2)' : 'transparent', borderRadius: 10 }} title="激光笔 (L)">🔴</button>
            <button onClick={(e) => { e.stopPropagation(); setTool('pen'); }} style={{ ...presBtn, fontSize: 11, padding: '3px 6px', background: tool === 'pen' ? 'rgba(255,255,255,0.2)' : 'transparent', borderRadius: 10 }} title="画笔 (P)">✏️</button>
            {tool === 'pen' && (
              <>
                {['#d97757','#ff3333','#6a9bcc','#ffffff'].map(c => (
                  <button key={c} onClick={(e) => { e.stopPropagation(); setPenColor(c); }} style={{ ...presBtn, color: c, fontSize: 10, padding: '2px 4px' }}>●</button>
                ))}
                <button onClick={(e) => { e.stopPropagation(); strokesRef.current = []; redrawCanvas(); }} style={{ ...presBtn, fontSize: 10, padding: '2px 4px' }} title="清除 (C)">🗑</button>
              </>
            )}
          </div>

          {/* Progress bar — thin line at bottom */}
          <div style={{ position: 'fixed', bottom: 0, left: 0, height: 2, background: 'rgba(217,119,87,0.7)', width: `${((currentIndex + 1) / slides.length) * 100}%`, transition: 'width 0.4s ease-out', zIndex: 40 }} />
        </div>
      );
    });

    const presBtn = {
      background: 'transparent', border: 'none', color: '#fff', cursor: 'pointer',
      padding: '6px 10px', borderRadius: 6, fontSize: 15, lineHeight: 1,
    };

    // SlideCanvas: contentEditable wrapper that preserves HTML
    const SlideCanvas = React.forwardRef(({ html, onBlur, editable, onMouseDown, onMouseMove, onDoubleClick, onContextMenu, cursor }, ref) => {
      const innerRef = useRef(null);
      React.useImperativeHandle(ref, () => innerRef.current);

      useEffect(() => {
        if (innerRef.current) {
          innerRef.current.innerHTML = html;
        }
      }, [html]);

      return (
        <div
          ref={innerRef}
          onBlur={onBlur}
          onMouseDown={onMouseDown}
          onMouseMove={onMouseMove}
          onDoubleClick={onDoubleClick}
          onContextMenu={onContextMenu}
          style={{
            width: CANVAS_W,
            height: CANVAS_H,
            background: '#fff',
            borderRadius: 8,
            overflow: 'hidden',
            boxShadow: '0 4px 24px rgba(0,0,0,0.10)',
            flexShrink: 0,
            outline: 'none',
            cursor: cursor || 'default',
            position: 'relative',
          }}
        />
      );
    });

    // ========================================================================
    // AI ACTION BLOCK — collapsible action detail (Claude Code style)
    // ========================================================================
    function AiActionBlock({ text, detail }) {
      const [expanded, setExpanded] = useState(false);
      return (
        <div style={{ marginTop: 2 }}>
          <div
            onClick={() => detail && setExpanded(e => !e)}
            style={{ display: 'flex', gap: 8, alignItems: 'flex-start', cursor: detail ? 'pointer' : 'default' }}
          >
            <div style={{ width: 7, height: 7, borderRadius: '50%', background: '#6a9bcc', flexShrink: 0, marginTop: 5 }} />
            <div style={{ fontSize: 13, color: '#141413', lineHeight: 1.6 }}>
              <span style={{ fontWeight: 500 }}>{text}</span>
              {detail && (
                <span style={{ fontSize: 11, color: '#b0aea5', marginLeft: 8 }}>
                  {expanded ? '▾' : '▸'} {expanded ? '收起' : '详情'}
                </span>
              )}
            </div>
          </div>
          {expanded && detail && (
            <div style={{
              marginLeft: 15, marginTop: 4, padding: '8px 10px',
              background: '#f0efeb', borderRadius: 6, borderLeft: '2px solid #e8e6dc',
              fontSize: 12, color: '#b0aea5', lineHeight: 1.6, whiteSpace: 'pre-wrap',
            }}>
              {detail}
            </div>
          )}
        </div>
      );
    }

    // Glimmer spinner — Claude Code style character cycling
    function GlimmerSpinner({ color }) {
      const chars = ['·', '✻', '✽', '✶', '✳', '✢'];
      const [idx, setIdx] = useState(0);
      useEffect(() => {
        const t = setInterval(() => setIdx(i => (i + 1) % chars.length), 150);
        return () => clearInterval(t);
      }, []);
      return (
        <span style={{ color: color || '#d97757', fontSize: 14, fontWeight: 700, display: 'inline-block', width: 14, textAlign: 'center' }}>
          {chars[idx]}
        </span>
      );
    }

    // Streaming text — reveals text character by character
    function StreamingText({ text, speed, style: s }) {
      const [shown, setShown] = useState(0);
      useEffect(() => {
        if (shown >= text.length) return;
        const t = setTimeout(() => setShown(n => n + 1), speed || 25);
        return () => clearTimeout(t);
      }, [shown, text]);
      return <span style={s}>{text.slice(0, shown)}{shown < text.length ? '▍' : ''}</span>;
    }

    const fmtBtn = {
      background: 'none', border: 'none', color: '#fff', cursor: 'pointer',
      padding: '4px 8px', borderRadius: 4, fontSize: 14, fontFamily: 'inherit', lineHeight: 1,
    };

    const btnStyle = {
      padding: '5px 12px',
      fontSize: 13,
      background: '#fff',
      color: '#141413',
      border: '1px solid #e8e6dc',
      borderRadius: 6,
      cursor: 'pointer',
      fontFamily: 'inherit',
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
