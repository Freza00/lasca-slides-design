    html, body { width: 100%; height: 100%; overflow: hidden; }

    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d4d2ca; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #b0aea5; }
    /* Reveal-style arrow idle bounce */
    @keyframes arrow-bounce-left {
      0%, 100% { transform: translateY(-50%) translateX(0); }
      50% { transform: translateY(-50%) translateX(-5px); }
    }
    @keyframes arrow-bounce-right {
      0%, 100% { transform: translateY(-50%) translateX(0); }
      50% { transform: translateY(-50%) translateX(5px); }
    }
    .nav-arrow-left { animation: arrow-bounce-left 2s ease-in-out infinite; }
    .nav-arrow-right { animation: arrow-bounce-right 2s ease-in-out infinite; }
    .nav-arrow:hover { animation: none !important; }
    /* Thinking dot pulse */
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Style panel inputs */
    .style-panel input[type="range"] { height: 4px; }
    .style-panel select:focus, .style-panel input:focus { border-color: #d97757 !important; }

      // Multi-tab: each tab is a deck { name, slides }
      const [decks, setDecks] = useState([{ id: 'deck-1', name: 'AI 不是 Magic', slides: SLIDES }]);
      const [activeDeckId, setActiveDeckId] = useState('deck-1');
      const activeDeck = decks.find(d => d.id === activeDeckId) || decks[0];

      const [currentIndex, setCurrentIndex] = useState(0);
      const slides = activeDeck.slides;
      const [isPresenting, setIsPresenting] = useState(false);
      const [presMode, setPresMode] = useState('full');
      const [isPdfExporting, setIsPdfExporting] = useState(false);

      // Update slides for the active deck
      const setSlides = (updater) => {
        setDecks(prev => prev.map(d => {
          if (d.id !== activeDeckId) return d;
          const newSlides = typeof updater === 'function' ? updater(d.slides) : updater;
          return { ...d, slides: newSlides };
        }));
      };

      // Import HTML file as a new tab
      const importHtmlTab = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.html,.htm,.lasca';
        input.onchange = async (e) => {
          try {
            const file = e.target.files[0];
            const text = await file.text();
            const extracted = parseHtmlToSlides(text, file.name);
            const newId = 'deck-' + Date.now();
            const name = file.name.replace(/\.(html?|lasca)$/i, '');
            setDecks(prev => [...prev, { id: newId, name, slides: extracted }]);
            setActiveDeckId(newId);
            setCurrentIndex(0);
          } catch { alert('导入失败'); }
        };
        input.click();
      };

      // Close a tab
      const closeDeck = (id) => {
        if (decks.length <= 1) return;
        const remaining = decks.filter(d => d.id !== id);
        setDecks(remaining);
        if (activeDeckId === id) {
          setActiveDeckId(remaining[0].id);
          setCurrentIndex(0);
        }
      };

      // switchDeck is defined after syncSlideHtml below
      const [editingEl, setEditingEl] = useState(null); // DOM element currently being text-edited
      const [selectedEl, setSelectedEl] = useState(null); // DOM element ref for selection highlight
      const [showToolbar, setShowToolbar] = useState(false);
      const [toolbarPos, setToolbarPos] = useState({ x: 0, y: 0 });

      const presentRef = useRef(null);
      const canvasRef = useRef(null);
      const dragState = useRef(null);

      // Sync edits from contentEditable back to state
      const syncSlideHtml = useCallback(() => {
        if (canvasRef.current) {
          // Remove any selection outlines before saving
          const el = canvasRef.current.querySelector('[data-selected="true"]');
          if (el) { el.style.outline = ''; el.removeAttribute('data-selected'); }
          const newHtml = canvasRef.current.innerHTML;
          setSlides(prev => prev.map((s, i) => i === currentIndex ? { ...s, html: newHtml } : s));
        }
      }, [currentIndex]);

      // Show floating toolbar on text selection (only when text-editing)
      const handleSelect = useCallback(() => {
        if (!editingEl) { setShowToolbar(false); return; }
        const sel = window.getSelection();
        if (sel && sel.toString().length > 0 && canvasRef.current?.contains(sel.anchorNode)) {
          const range = sel.getRangeAt(0);
          const rect = range.getBoundingClientRect();
          const canvasRect = canvasRef.current.getBoundingClientRect();
          setToolbarPos({ x: rect.left - canvasRect.left + rect.width / 2, y: rect.top - canvasRect.top - 44 });
          setShowToolbar(true);
        } else {
          setShowToolbar(false);
        }
      }, [editingEl]);

      useEffect(() => {
        document.addEventListener('selectionchange', handleSelect);
        return () => document.removeEventListener('selectionchange', handleSelect);
      }, [handleSelect]);

      // Format commands
      const execFormat = (cmd, val) => {
        document.execCommand(cmd, false, val);
        syncSlideHtml();
      };

      // Clear selection highlight
      const clearSelected = () => {
        if (canvasRef.current) {
          const prev = canvasRef.current.querySelector('[data-selected="true"]');
          if (prev) { prev.style.outline = ''; prev.style.outlineOffset = ''; prev.removeAttribute('data-selected'); }
        }
        setSelectedEl(null);
      };

      // Enter text editing mode
      const enterTextEditing = (el) => {
        clearSelected();
        el.setAttribute('contenteditable', 'true');
        el.style.outline = '2px solid #6a9bcc';
        el.style.outlineOffset = '2px';
        el.focus();
        setEditingEl(el);
      };

      // Exit text editing mode
      const exitTextEditing = () => {
        if (editingEl) {
          editingEl.removeAttribute('contenteditable');
          editingEl.style.outline = '';
          editingEl.style.outlineOffset = '';
        }
        setEditingEl(null);
        setShowToolbar(false);
        syncSlideHtml();
      };

      // Switch tab
      const switchDeck = (id) => {
        if (id === activeDeckId) return;
        syncSlideHtml();
        setActiveDeckId(id);
        setCurrentIndex(0);
        clearSelected();
      };

      // Is element the slide root container? (should never be dragged)
      const isRootContainer = (el) => {
        if (!canvasRef.current) return false;
        // Direct child of canvas = root. Also skip if it covers ≥90% of canvas area.
        if (el === canvasRef.current.firstElementChild) return true;
        if (el.parentElement === canvasRef.current) {
          const r = el.getBoundingClientRect();
          const c = canvasRef.current.getBoundingClientRect();
          if (r.width >= c.width * 0.9 && r.height >= c.height * 0.9) return true;
        }
        return false;
      };

      // Find the meaningful block element from a click target (skip root containers)
      const findBlock = (target) => {
        if (!canvasRef.current) return null;
        let el = target;
        while (el && el !== canvasRef.current) {
          const parent = el.parentElement;
          if (!parent) break;
          // A "block" = child of a flex/grid parent, or direct child of slide root
          const isChild = parent === canvasRef.current || parent === canvasRef.current.firstElementChild;
          const pDisp = getComputedStyle(parent).display;
          const isFlexGridChild = pDisp.includes('flex') || pDisp.includes('grid');
          if (isChild || isFlexGridChild) {
            // Skip if this element IS the root container (background)
            if (isRootContainer(el)) {
              el = el.parentElement;
              continue;
            }
            return el;
          }
          el = parent;
        }
        return null;
      };

      // Hover highlight — show element outline on hover (skip when text-editing or dragging)
      const hoverElRef = useRef(null);
      const handleCanvasHover = useCallback((e) => {
        if (editingEl || dragState.current) return;
        const block = findBlock(e.target);
        // Clear previous hover
        if (hoverElRef.current && hoverElRef.current !== block && hoverElRef.current.getAttribute('data-selected') !== 'true') {
          hoverElRef.current.style.outline = '';
          hoverElRef.current.style.outlineOffset = '';
        }
        if (block && block.getAttribute('data-selected') !== 'true') {
          block.style.outline = '1.5px dashed rgba(106,155,204,0.6)';
          block.style.outlineOffset = '2px';
          hoverElRef.current = block;
          if (canvasRef.current) canvasRef.current.style.cursor = 'grab';
        } else {
          hoverElRef.current = null;
          if (canvasRef.current) canvasRef.current.style.cursor = 'default';
        }
      }, [editingEl]);

      // Snap / alignment guide calculation
      const SNAP_THRESHOLD = 5;
      const calcGuides = useCallback((block) => {
        if (!canvasRef.current || !block) return { guides: [], snapDx: 0, snapDy: 0 };
        const canvasRect = canvasRef.current.getBoundingClientRect();
        const blockRect = block.getBoundingClientRect();
        // Block edges relative to canvas
        const bLeft = blockRect.left - canvasRect.left;
        const bRight = blockRect.right - canvasRect.left;
        const bTop = blockRect.top - canvasRect.top;
        const bBottom = blockRect.bottom - canvasRect.top;
        const bCx = (bLeft + bRight) / 2;
        const bCy = (bTop + bBottom) / 2;

        // Canvas center
        const cCx = CANVAS_W / 2;
        const cCy = CANVAS_H / 2;

        // Collect snap targets: canvas edges, canvas center, other elements
        const vTargets = [{ pos: 0, label: 'edge' }, { pos: cCx, label: 'center' }, { pos: CANVAS_W, label: 'edge' }];
        const hTargets = [{ pos: 0, label: 'edge' }, { pos: cCy, label: 'center' }, { pos: CANVAS_H, label: 'edge' }];

        // Other sibling elements
        const root = canvasRef.current.firstElementChild;
        if (root) {
          const siblings = root.querySelectorAll('*');
          siblings.forEach(sib => {
            if (sib === block || sib.contains(block) || block.contains(sib)) return;
            if (sib.tagName === 'STYLE' || sib.tagName === 'SCRIPT') return;
            const r = sib.getBoundingClientRect();
            if (r.width < 10 || r.height < 10) return;
            const sLeft = r.left - canvasRect.left;
            const sRight = r.right - canvasRect.left;
            const sTop = r.top - canvasRect.top;
            const sBottom = r.bottom - canvasRect.top;
            const sCx = (sLeft + sRight) / 2;
            const sCy = (sTop + sBottom) / 2;
            vTargets.push({ pos: sLeft, label: 'el' }, { pos: sRight, label: 'el' }, { pos: sCx, label: 'el-center' });
            hTargets.push({ pos: sTop, label: 'el' }, { pos: sBottom, label: 'el' }, { pos: sCy, label: 'el-center' });
          });
        }

        // Find closest snap for vertical lines (affect X position)
        const blockVEdges = [bLeft, bRight, bCx];
        const blockHEdges = [bTop, bBottom, bCy];
        let snapDx = 0, snapDy = 0;
        const foundGuides = [];

        // Vertical guides (X alignment)
        let bestVDist = SNAP_THRESHOLD + 1;
        for (const edge of blockVEdges) {
          for (const target of vTargets) {
            const dist = Math.abs(edge - target.pos);
            if (dist < SNAP_THRESHOLD && dist < bestVDist) {
              bestVDist = dist;
              snapDx = target.pos - edge;
            }
          }
        }
        // After snapping, find all matching guides
        for (const edge of blockVEdges) {
          const snappedEdge = edge + snapDx;
          for (const target of vTargets) {
            if (Math.abs(snappedEdge - target.pos) < 1) {
              foundGuides.push({ type: 'v', pos: target.pos });
            }
          }
        }

        // Horizontal guides (Y alignment)
        let bestHDist = SNAP_THRESHOLD + 1;
        for (const edge of blockHEdges) {
          for (const target of hTargets) {
            const dist = Math.abs(edge - target.pos);
            if (dist < SNAP_THRESHOLD && dist < bestHDist) {
              bestHDist = dist;
              snapDy = target.pos - edge;
            }
          }
        }
        for (const edge of blockHEdges) {
          const snappedEdge = edge + snapDy;
          for (const target of hTargets) {
            if (Math.abs(snappedEdge - target.pos) < 1) {
              foundGuides.push({ type: 'h', pos: target.pos });
            }
          }
        }

        // Deduplicate guides
        const unique = [];
        const seen = new Set();
        foundGuides.forEach(g => {
          const key = `${g.type}-${Math.round(g.pos)}`;
          if (!seen.has(key)) { seen.add(key); unique.push(g); }
        });

        return { guides: unique, snapDx, snapDy };
      }, []);

      // Drag logic — higher threshold (6px) to avoid accidental drags
      const handleCanvasMouseDown = (e) => {
        // Context menu is dismissed by backdrop click, so just skip if it was open
        if (contextMenu) { setContextMenu(null); return; }
        // If clicking while text-editing, check if click is outside the editing element
        if (editingEl) {
          if (!editingEl.contains(e.target)) {
            exitTextEditing();
          }
          return; // Don't start drag while editing text
        }
        const block = findBlock(e.target);
        if (!block) { clearSelected(); return; }

        // Select it
        clearSelected();
        block.style.outline = '2px solid #d97757';
        block.style.outlineOffset = '2px';
        block.setAttribute('data-selected', 'true');
        setSelectedEl(block);

        // Prepare for potential drag
        const comp = getComputedStyle(block);
        if (comp.position === 'static') {
          block.style.position = 'relative';
        }
        const startX = e.clientX;
        const startY = e.clientY;
        const origLeft = parseFloat(block.style.left) || 0;
        const origTop = parseFloat(block.style.top) || 0;

        dragState.current = { block, startX, startY, origLeft, origTop, moved: false };

        const onMove = (ev) => {
          if (!dragState.current) return;
          const dx = ev.clientX - dragState.current.startX;
          const dy = ev.clientY - dragState.current.startY;
          // Higher threshold: only start dragging after 6px movement
          if (!dragState.current.moved && Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
          if (!dragState.current.moved) {
            dragState.current.moved = true;
            dragState.current.block.style.transition = 'none';
            dragState.current.block.style.cursor = 'grabbing';
          }
          // Apply position first (before snap calc)
          dragState.current.block.style.left = (dragState.current.origLeft + dx) + 'px';
          dragState.current.block.style.top = (dragState.current.origTop + dy) + 'px';
          // Calculate snap guides
          const { guides: g, snapDx, snapDy } = calcGuides(dragState.current.block);
          // Apply snap offset
          if (snapDx !== 0 || snapDy !== 0) {
            dragState.current.block.style.left = (dragState.current.origLeft + dx + snapDx) + 'px';
            dragState.current.block.style.top = (dragState.current.origTop + dy + snapDy) + 'px';
          }
          setGuides(g);
          dragState.current.block.style.opacity = '0.85';
          dragState.current.block.style.boxShadow = '0 4px 16px rgba(0,0,0,0.15)';
        };
        const onUp = () => {
          if (dragState.current) {
            dragState.current.block.style.opacity = '';
            dragState.current.block.style.boxShadow = '';
            dragState.current.block.style.cursor = '';
            dragState.current.block.style.transition = '';
            if (dragState.current.moved) {
              pushHistory();
            }
          }
          dragState.current = null;
          setGuides([]);
          syncSlideHtml();
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        e.preventDefault();
      };

      // Double-click to enter text editing
      const handleCanvasDblClick = (e) => {
        if (editingEl) return; // already editing
        const block = findBlock(e.target);
        if (block) {
          enterTextEditing(block);
        }
      };

      // Insert image as base64
      const insertImage = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            const dataUrl = reader.result;
            if (editingEl && canvasRef.current) {
              // Insert at cursor when text-editing
              document.execCommand('insertImage', false, dataUrl);
              syncSlideHtml();
            } else {
              // Append to slide HTML
              const imgHtml = `<img src="${dataUrl}" style="max-width:400px; max-height:300px; display:block; margin:20px auto; border-radius:8px;" />`;
              setSlides(prev => prev.map((s, i) => {
                if (i !== currentIndex) return s;
                // Insert before closing tag of root div
                const lastClose = s.html.lastIndexOf('</div>');
                const newHtml = s.html.slice(0, lastClose) + imgHtml + s.html.slice(lastClose);
                return { ...s, html: newHtml };
              }));
            }
          };
          reader.readAsDataURL(file);
        };
        input.click();
      };

      // Insert text box
      const insertTextBox = () => {
        pushHistory();
        const textBox = '<div style="position:absolute;left:100px;top:100px;padding:12px 16px;min-width:120px;min-height:40px;font-size:18px;color:#141413;background:rgba(255,255,255,0.9);border:1px dashed #b0aea5;border-radius:4px;cursor:text;" contenteditable="true">在此输入文字</div>';
        setSlides(prev => prev.map((s, i) => {
          if (i !== currentIndex) return s;
          // Insert text box inside the first child div (or append to end)
          let html = s.html;
          const lastDivClose = html.lastIndexOf('</div>');
          if (lastDivClose >= 0) {
            html = html.slice(0, lastDivClose) + textBox + html.slice(lastDivClose);
          } else {
            html += textBox;
          }
          return { ...s, html };
        }));
      };

      // Undo/Redo history
      const historyRef = useRef([]);
      const historyIdxRef = useRef(-1);

      const pushHistory = useCallback(() => {
        const snapshot = JSON.stringify(slides);
        const h = historyRef.current;
        // Trim future states
        historyRef.current = h.slice(0, historyIdxRef.current + 1);
        historyRef.current.push(snapshot);
        historyIdxRef.current = historyRef.current.length - 1;
      }, [slides]);

      // Save snapshot on meaningful changes
      useEffect(() => {
        pushHistory();
      }, [slides.length]); // track slide additions/deletions

      const undo = () => {
        if (historyIdxRef.current <= 0) return;
        historyIdxRef.current--;
        const prev = JSON.parse(historyRef.current[historyIdxRef.current]);
        setSlides(() => prev); // bypass the setSlides wrapper
        setDecks(d => d.map(dk => dk.id === activeDeckId ? { ...dk, slides: prev } : dk));
      };

      const redo = () => {
        if (historyIdxRef.current >= historyRef.current.length - 1) return;
        historyIdxRef.current++;
        const next = JSON.parse(historyRef.current[historyIdxRef.current]);
        setDecks(d => d.map(dk => dk.id === activeDeckId ? { ...dk, slides: next } : dk));
      };

      // Keyboard navigation — only when not editing text in canvas
      useEffect(() => {
        const handler = (e) => {
          // Skip if user is typing in any input/textarea
          const tag = document.activeElement?.tagName;
          const isInInput = tag === 'TEXTAREA' || tag === 'INPUT' || document.activeElement?.contentEditable === 'true';
          const isEditing = editingEl !== null;

          // Undo/Redo shortcuts
          if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) {
            e.preventDefault(); undo(); return;
          }
          if ((e.metaKey || e.ctrlKey) && (e.key === 'Z' || (e.key === 'z' && e.shiftKey))) {
            e.preventDefault(); redo(); return;
          }

          // Delete selected element (not while editing text or in input)
          if (selectedEl && !editingEl && !isInInput && (e.key === 'Delete' || e.key === 'Backspace')) {
            e.preventDefault();
            selectedEl.remove();
            clearSelected();
            syncSlideHtml();
            return;
          }

          if (e.key === 'Escape') {
            if (contextMenu) { setContextMenu(null); return; }
            if (editingEl) { exitTextEditing(); return; }
            if (selectedEl) { clearSelected(); return; }
            setIsPresenting(false);
            return;
          }
          if (isEditing || isInInput) return;
          if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
            e.preventDefault();
            setCurrentIndex(i => Math.min(i + 1, slides.length - 1));
          } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
            e.preventDefault();
            setCurrentIndex(i => Math.max(i - 1, 0));
          }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [slides.length, syncSlideHtml, selectedEl, editingEl, contextMenu, exitTextEditing]);

      // Fullscreen present
      useEffect(() => {
        if (isPresenting && presentRef.current) {
          presentRef.current.requestFullscreen?.();
        }
      }, [isPresenting]);
      useEffect(() => {
        const onFs = () => { if (!document.fullscreenElement) setIsPresenting(false); };
        document.addEventListener('fullscreenchange', onFs);
        return () => document.removeEventListener('fullscreenchange', onFs);
      }, []);

      // Move slide
      const moveSlide = (from, dir) => {
        const to = from + dir;
        if (to < 0 || to >= slides.length) return;
        const arr = [...slides];
        [arr[from], arr[to]] = [arr[to], arr[from]];
        setSlides(arr);
        setCurrentIndex(to);
      };

      // Delete slide
      const deleteSlide = (idx) => {
        if (slides.length <= 1) return;
        const arr = slides.filter((_, i) => i !== idx);
        setSlides(arr);
        setCurrentIndex(Math.min(idx, arr.length - 1));
      };

      // Add slide
      const addSlide = () => {
        const newSlide = {
          id: `slide-${Date.now()}`,
          html: `<div style="display:flex;align-items:center;justify-content:center;height:100%;background:#faf9f5;font-family:'Poppins','Noto Sans SC',sans-serif;"><h1 style="font-size:32px;color:#b0aea5;">New Slide</h1></div>`
        };
        const arr = [...slides];
        arr.splice(currentIndex + 1, 0, newSlide);
        setSlides(arr);
        setCurrentIndex(currentIndex + 1);
      };

      // Export PDF
      const exportPdf = async () => {
        setIsPdfExporting(true);
        try {
          // Dynamically load html2canvas + jsPDF
          if (!window.html2canvas) {
            await new Promise((res, rej) => {
              const s = document.createElement('script');
              s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
              s.onload = res; s.onerror = rej; document.head.appendChild(s);
            });
          }
          if (!window.jspdf) {
            await new Promise((res, rej) => {
              const s = document.createElement('script');
              s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
              s.onload = res; s.onerror = rej; document.head.appendChild(s);
            });
          }
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [CANVAS_W, CANVAS_H] });

          for (let i = 0; i < slides.length; i++) {
            // Render offscreen
            const container = document.createElement('div');
            container.style.cssText = `position:fixed;left:-9999px;top:0;width:${CANVAS_W}px;height:${CANVAS_H}px;overflow:hidden;`;
            container.innerHTML = slides[i].html;
            document.body.appendChild(container);

            const canvas = await window.html2canvas(container, { width: CANVAS_W, height: CANVAS_H, scale: 2, useCORS: true });
            const imgData = canvas.toDataURL('image/png');
            if (i > 0) pdf.addPage();
            pdf.addImage(imgData, 'PNG', 0, 0, CANVAS_W, CANVAS_H);
            document.body.removeChild(container);
          }
          pdf.save('presentation.pdf');
        } catch (err) {
          alert('导出失败: ' + err.message);
        }
        setIsPdfExporting(false);
      };

      // ---- Shared HTML parser (reused by importFile and importHtmlTab) ----
      const parseHtmlToSlides = (text, fileName) => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');
        let allStyles = '';
        doc.querySelectorAll('style').forEach(s => { allStyles += s.outerHTML + '\n'; });

        let extractedSlides = [];

        // Try 1: SLIDES array in script (our own format / .lasca)
        const scripts = doc.querySelectorAll('script');
        for (const script of scripts) {
          const match = script.textContent.match(/const SLIDES\s*=\s*\[([\s\S]*?)\];/);
          if (match) {
            try {
              const fn = new Function('return [' + match[1] + ']');
              extractedSlides = fn();
            } catch {}
          }
        }

        // Try 2: .slide / section divs
        if (extractedSlides.length === 0) {
          const slideDivs = doc.querySelectorAll('.slide, [data-slide], section');
          if (slideDivs.length > 0) {
            let cssW = 0, cssH = 0;
            const wMatch = allStyles.match(/\.slide\s*\{[^}]*width\s*:\s*(\d+)px/);
            const hMatch = allStyles.match(/\.slide\s*\{[^}]*height\s*:\s*(\d+)px/);
            if (wMatch) cssW = parseInt(wMatch[1]);
            if (hMatch) cssH = parseInt(hMatch[1]);
            const slideW = cssW || 1600;
            const slideH = cssH || 900;
            const scale = Math.min(CANVAS_W / slideW, CANVAS_H / slideH, 1);
            const scaleStyle = scale < 1
              ? `transform:scale(${scale.toFixed(4)});transform-origin:0 0;width:${slideW}px;height:${slideH}px;`
              : `width:100%;height:100%;`;
            slideDivs.forEach((div, i) => {
              extractedSlides.push({ id: `imp-${Date.now()}-${i}`, html: `<div style="${scaleStyle}overflow:hidden;position:relative;">${allStyles}${div.outerHTML}</div>` });
            });
          }
        }

        // Try 3: entire body as one slide
        if (extractedSlides.length === 0) {
          extractedSlides = [{ id: `imp-${Date.now()}`, html: `<div style="width:100%;height:100%;overflow:hidden;position:relative;">${allStyles}${doc.body.innerHTML}</div>` }];
        }

        return extractedSlides;
      };

      // ---- Unified Import (HTML / .lasca / PPTX / JSON) ----
      const importFile = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.html,.htm,.lasca,.pptx,.json';
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const ext = file.name.split('.').pop().toLowerCase();

          try {
            // ---- HTML / .lasca ----
            if (ext === 'html' || ext === 'htm' || ext === 'lasca') {
              const text = await file.text();
              const extracted = parseHtmlToSlides(text, file.name);
              const newId = 'deck-' + Date.now();
              const name = file.name.replace(/\.(html?|lasca)$/i, '');
              setDecks(prev => [...prev, { id: newId, name, slides: extracted }]);
              setActiveDeckId(newId);
              setCurrentIndex(0);
            }

            // ---- JSON ----
            else if (ext === 'json') {
              const text = await file.text();
              const data = JSON.parse(text);
              if (Array.isArray(data) && data[0]?.html) {
                const newId = 'deck-' + Date.now();
                const name = file.name.replace(/\.json$/i, '');
                setDecks(prev => [...prev, { id: newId, name, slides: data }]);
                setActiveDeckId(newId);
                setCurrentIndex(0);
              } else { alert('JSON 格式不匹配。需要 [{id, html}, ...] 格式。'); }
            }

            // ---- PPTX ----
            else if (ext === 'pptx' || ext === 'ppt') {
              if (ext === 'ppt') { alert('暂不支持旧版 .ppt 格式，请转换为 .pptx 后重试。'); return; }
              // Load JSZip
              if (!window.JSZip) {
                await new Promise((res, rej) => {
                  const s = document.createElement('script');
                  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
                  s.onload = res; s.onerror = rej; document.head.appendChild(s);
                });
              }
              const zip = await window.JSZip.loadAsync(file);

              // Find slide XML files (ppt/slides/slide1.xml, slide2.xml, ...)
              const slideFiles = Object.keys(zip.files)
                .filter(f => /^ppt\/slides\/slide\d+\.xml$/i.test(f))
                .sort((a, b) => {
                  const na = parseInt(a.match(/slide(\d+)/)[1]);
                  const nb = parseInt(b.match(/slide(\d+)/)[1]);
                  return na - nb;
                });

              if (slideFiles.length === 0) { alert('PPTX 中未找到幻灯片。'); return; }

              const extractedSlides = [];
              for (let i = 0; i < slideFiles.length; i++) {
                const xml = await zip.files[slideFiles[i]].async('text');
                const xmlDoc = new DOMParser().parseFromString(xml, 'text/xml');

                // Extract all text runs
                const texts = [];
                const tNodes = xmlDoc.querySelectorAll('t');
                let currentPara = [];
                let lastParent = null;
                tNodes.forEach(t => {
                  const para = t.closest('p') || t.parentElement;
                  if (para !== lastParent && currentPara.length > 0) {
                    texts.push(currentPara.join(''));
                    currentPara = [];
                  }
                  lastParent = para;
                  currentPara.push(t.textContent || '');
                });
                if (currentPara.length > 0) texts.push(currentPara.join(''));

                // Build simple slide HTML from extracted text
                const title = texts[0] || `Slide ${i + 1}`;
                const body = texts.slice(1);
                let slideHtml = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#faf9f5;font-family:'Poppins','Noto Sans SC',sans-serif;padding:40px;">`;
                slideHtml += `<h2 style="font-size:32px;font-weight:700;color:#d97757;margin-bottom:20px;text-align:center;">${title.replace(/</g,'&lt;')}</h2>`;
                if (body.length > 0) {
                  slideHtml += `<div style="font-size:18px;color:#141413;line-height:1.8;text-align:center;">`;
                  body.forEach(line => {
                    if (line.trim()) slideHtml += `<p style="margin-bottom:8px;">${line.replace(/</g,'&lt;')}</p>`;
                  });
                  slideHtml += `</div>`;
                }
                slideHtml += `</div>`;

                extractedSlides.push({ id: `pptx-${Date.now()}-${i}`, html: slideHtml });
              }

              const newId = 'deck-' + Date.now();
              const name = file.name.replace(/\.pptx?$/i, '');
              setDecks(prev => [...prev, { id: newId, name, slides: extractedSlides }]);
              setActiveDeckId(newId);
              setCurrentIndex(0);
            }

            else {
              alert(`不支持的文件格式: .${ext}`);
            }
          } catch (err) {
            console.error(err);
            alert('导入失败: ' + err.message);
          }
        };
        input.click();
      };

      // Export .lasca (HTML)
      const exportLasca = () => {
        const slideData = JSON.stringify(slides, null, 2);
        const SC = '<' + '/script>'; // avoid breaking outer script tag
        const html = [
          '<!DOCTYPE html>',
          '<html lang="zh-CN"><head><meta charset="UTF-8">',
          '<meta name="viewport" content="width=device-width, initial-scale=1.0">',
          '<title>' + activeDeck.name + '</title>',
          '<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">',
          '<style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden;background:#f0efe9;font-family:"Poppins","Noto Sans SC",sans-serif}',
          '.slide-container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;position:relative}',
          '.slide-inner{width:960px;height:540px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.12);border-radius:4px}',
          '.nav{position:fixed;top:50%;transform:translateY(-50%);cursor:pointer;opacity:0.4;transition:opacity 0.3s;z-index:10;padding:16px}.nav:hover{opacity:0.8}',
          '.nav-l{left:16px}.nav-r{right:16px}',
          '.counter{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:13px;color:#b0aea5;z-index:10}',
          '.progress{position:fixed;bottom:0;left:0;height:2px;background:#d97757;transition:width 0.4s;z-index:10}',
          '</style></head><body>',
          '<div class="slide-container"><div class="slide-inner" id="slide"></div></div>',
          '<div class="nav nav-l" id="prev" onclick="go(-1)"><svg width="32" height="48" viewBox="0 0 32 48" fill="none"><path d="M24 4L8 24L24 44" stroke="#141413" stroke-width="2.5" stroke-linecap="round"/></svg></div>',
          '<div class="nav nav-r" id="next" onclick="go(1)"><svg width="32" height="48" viewBox="0 0 32 48" fill="none"><path d="M8 4L24 24L8 44" stroke="#141413" stroke-width="2.5" stroke-linecap="round"/></svg></div>',
          '<div class="counter" id="counter"></div>',
          '<div class="progress" id="progress"></div>',
          '<script>',
          'var SLIDES=' + slideData + ';',
          'var idx=0;',
          'function render(){document.getElementById("slide").innerHTML=SLIDES[idx].html;document.getElementById("counter").textContent=(idx+1)+" / "+SLIDES.length;document.getElementById("progress").style.width=((idx+1)/SLIDES.length*100)+"%";document.getElementById("prev").style.display=idx>0?"":"none";document.getElementById("next").style.display=idx<SLIDES.length-1?"":"none";}',
          'function go(d){idx=Math.max(0,Math.min(SLIDES.length-1,idx+d));render();}',
          'document.addEventListener("keydown",function(e){if(e.key==="ArrowRight"||e.key===" ")go(1);if(e.key==="ArrowLeft")go(-1);});',
          'render();',
          SC,
          '</body></html>',
        ].join('\n');
        const blob = new Blob([html], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = activeDeck.name + '.lasca';
        a.click();
      };

      // Export JSON (secondary)
      const exportJson = () => {
        const blob = new Blob([JSON.stringify(slides, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = activeDeck.name + '.json';
        a.click();
      };

      // Context menu handler — use page coordinates for accurate positioning
      const handleCanvasContextMenu = (e) => {
        e.preventDefault();
        const block = findBlock(e.target);
        setContextMenu({
          x: e.pageX,
          y: e.pageY,
          el: block,
        });
      };

      // ---- Page detection from text (no AI, pure regex) ----
      const detectPages = (text) => {
        if (!text) return null;
        // Range: "第3到5页" "第3-5页"
        const rangeMatch = text.match(/第(\d+)[到至\-~](\d+)页/);
        if (rangeMatch) {
          const pages = [];
          for (let i = parseInt(rangeMatch[1]); i <= parseInt(rangeMatch[2]); i++) pages.push(i);
          return pages;
        }
        // Multiple mentions FIRST: "第7页和第5页" "第7页、第5页" "第7页第5页"
        const allMentions = [...text.matchAll(/第(\d+)页/g)].map(m => parseInt(m[1]));
        if (allMentions.length > 1) return [...new Set(allMentions)];
        // Compact list: "第3、5、7页" or "第3,5,7页"
        const compactMatch = text.match(/第([\d][、,，\d\s]+[\d])页/);
        if (compactMatch) {
          const nums = compactMatch[1].split(/[、,，\s]+/).map(n => parseInt(n.trim())).filter(n => !isNaN(n));
          if (nums.length > 1) return [...new Set(nums)];
        }
        // Single page: "第7页"
        if (allMentions.length === 1) return allMentions;
        return null;
      };

      // Compute smart label for left button
      const detectedPages = detectPages(chatInput);
      const smartLabel = detectedPages
        ? (detectedPages.length === 1 ? '第' + detectedPages[0] + '页' : '多页')
        : '第' + (currentIndex + 1) + '页';
      const smartTooltip = detectedPages && detectedPages.length > 1
        ? '第 ' + detectedPages.join('、') + ' 页' : '';

      // ---- AI Chat ----
      const [undoToast, setUndoToast] = useState(null); // { id, text, timer }

      const sendChat = (scope) => {
        const text = chatInput.trim();
        if (!text) return;
        const isGlobal = scope === 'global';
        const targetPages = detectedPages || [currentIndex + 1];
        const slideId = slides[currentIndex]?.id;
        const now = Date.now();

        // Scope label
        let scopeLabel, scopeType;
        if (isGlobal) {
          scopeLabel = '全局';
          scopeType = 'global';
        } else if (detectedPages && detectedPages.length > 1) {
          scopeLabel = '第' + detectedPages.join('、') + '页';
          scopeType = 'multi';
        } else {
          const pg = detectedPages ? detectedPages[0] : currentIndex + 1;
          scopeLabel = '第' + pg + '页';
          scopeType = 'page';
        }

        const userMsg = { id: 'u-' + now, role: 'user', text, ts: now, scope: scopeType, slideIdx: currentIndex + 1, scopeLabel };
        setChatMessages(prev => [...prev, userMsg]);
        setChatInput('');

        if (isGlobal || scopeType === 'multi') {
          // ---- Progressive flow: preview on current page first ----
          const previewPage = currentIndex + 1;
          setTimeout(() => {
            setChatMessages(prev => [...prev,
              { id: 'a1-' + now, role: 'ai', type: 'status', text: '先在第 ' + previewPage + ' 页预览…', ts: now }
            ]);
          }, 300);
          setTimeout(() => {
            setChatMessages(prev => [...prev,
              { id: 'a2-' + now, role: 'ai', type: 'action', text: '第 ' + previewPage + ' 页已修改',
                detail: '预览效果。接入 AI 后会真正修改内容。', ts: now + 1 }
            ]);
          }, 800);
          setTimeout(() => {
            setChatMessages(prev => [...prev,
              { id: 'a3-' + now, role: 'ai', type: 'confirm', text: '预览满意吗？',
                options: [
                  { label: isGlobal ? '满意，全部应用' : '满意，应用' + scopeLabel, action: 'apply-all-' + now },
                  { label: '再调一下', action: 'retry-' + now },
                ], ts: now + 2 }
            ]);
          }, 1200);
        } else {
          // ---- Single page: direct execute + undo ----
          setTimeout(() => {
            setChatMessages(prev => [...prev,
              { id: 'a1-' + now, role: 'ai', type: 'status', text: '正在修改 ' + scopeLabel + '…', ts: now }
            ]);
          }, 300);
          setTimeout(() => {
            setChatMessages(prev => [...prev,
              { id: 'a2-' + now, role: 'ai', type: 'action', text: '已修改 ' + scopeLabel,
                detail: '接入 AI 后会真正修改内容。\n现在你可以双击画布手动编辑。', ts: now + 1 }
            ]);
            // Log to per-slide actions
            if (slideId) {
              setSlideActions(prev => ({
                ...prev,
                [slideId]: [...(prev[slideId] || []), { id: 'sa-' + now, text: text.slice(0, 30), color: '#6a9bcc', ts: now }]
              }));
            }
            // Show undo toast
            showUndo('已修改 ' + scopeLabel, now);
          }, 800);
          setTimeout(() => {
            setChatMessages(prev => [...prev,
              { id: 'a3-' + now, role: 'ai', type: 'done', text: '完成！还有什么需要改的吗？', ts: now + 2 }
            ]);
          }, 1200);
        }
      };

      // Handle confirm button clicks in chat
      const handleConfirm = (action) => {
        const now = Date.now();
        if (action.startsWith('apply-all')) {
          setChatMessages(prev => [...prev,
            { id: 'c1-' + now, role: 'ai', type: 'status', text: '正在应用到其他页面…', ts: now }
          ]);
          setTimeout(() => {
            setChatMessages(prev => [...prev,
              { id: 'c2-' + now, role: 'ai', type: 'action', text: '抽样验证第 1、' + slides.length + ' 页', detail: '确认不同 layout 效果一致。', ts: now + 1 }
            ]);
          }, 600);
          setTimeout(() => {
            setChatMessages(prev => [...prev,
              { id: 'c3-' + now, role: 'ai', type: 'done', text: '全部 ' + slides.length + ' 页已更新！', ts: now + 2 }
            ]);
            showUndo('全部 ' + slides.length + ' 页已更新', now);
          }, 1200);
        } else if (action.startsWith('retry')) {
          setChatMessages(prev => [...prev,
            { id: 'c1-' + now, role: 'ai', type: 'done', text: '好的，告诉我怎么调整。', ts: now }
          ]);
        }
      };

      // Undo toast with 3s countdown
      const showUndo = (text, id) => {
        setUndoToast({ id, text, remaining: 3 });
      };
      useEffect(() => {
        if (!undoToast) return;
        if (undoToast.remaining <= 0) { setUndoToast(null); return; }
        const t = setTimeout(() => setUndoToast(prev => prev ? { ...prev, remaining: prev.remaining - 1 } : null), 1000);
        return () => clearTimeout(t);
      }, [undoToast]);
      const handleUndo = () => {
        if (undoToast) {
          setChatMessages(prev => [...prev,
            { id: 'undo-' + Date.now(), role: 'ai', type: 'done', text: '已撤销。', ts: Date.now() }
          ]);
          undo();
          setUndoToast(null);
        }
      };

      // Current slide action log
      const currentSlideActions = slideActions[slides[currentIndex]?.id] || [];

      // Auto-scroll chat
      useEffect(() => {
        if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
      }, [chatMessages]);

      // ---- Notes ----
      const currentNotes = slideNotes[slides[currentIndex]?.id] || '';
      const setCurrentNotes = (text) => {
        setSlideNotes(prev => ({ ...prev, [slides[currentIndex].id]: text }));
      };

      const currentSlide = slides[currentIndex];

      // ---- Presentation Mode ----
      if (isPresenting) {
        return (
          <PresentationMode
            ref={presentRef}
            slides={slides}
            currentIndex={currentIndex}
            onIndexChange={setCurrentIndex}
            onExit={() => setIsPresenting(false)}
            presMode={presMode}
          />
        );
      }

      // ---- Editor Mode ----
      return (
        <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', background: '#f0efeb', fontFamily: "'Poppins', 'Noto Sans SC', sans-serif" }}>

          {/* ---- Tab Bar ---- */}
          <div style={{ height: 36, background: '#e8e6dc', display: 'flex', alignItems: 'flex-end', paddingLeft: 8, gap: 2, flexShrink: 0 }}>
            {decks.map(deck => (
              <div
                key={deck.id}
                onClick={() => switchDeck(deck.id)}
                style={{
                  display: 'flex', alignItems: 'center', gap: 6,
                  padding: '5px 12px 5px 14px',
                  fontSize: 12, fontWeight: deck.id === activeDeckId ? 600 : 400,
                  color: deck.id === activeDeckId ? '#141413' : '#b0aea5',
                  background: deck.id === activeDeckId ? '#faf9f5' : 'transparent',
                  borderRadius: '6px 6px 0 0',
                  cursor: 'pointer',
                  maxWidth: 180,
                  whiteSpace: 'nowrap',
                  overflow: 'hidden',
                  textOverflow: 'ellipsis',
                }}
              >
                <span style={{ overflow: 'hidden', textOverflow: 'ellipsis' }}>{deck.name}</span>
                {decks.length > 1 && (
                  <span onClick={(e) => { e.stopPropagation(); closeDeck(deck.id); }} style={{ fontSize: 14, color: '#b0aea5', cursor: 'pointer', lineHeight: 1, marginLeft: 2 }} title="关闭">×</span>
                )}
              </div>
            ))}
            {/* Import HTML as new tab */}
            <button onClick={importHtmlTab} style={{ background: 'none', border: 'none', fontSize: 16, color: '#b0aea5', cursor: 'pointer', padding: '4px 10px', marginBottom: 1 }} title="导入 HTML 为新标签">+</button>
          </div>

          {/* ---- Main Body ---- */}
          <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>

          {/* ---- Sidebar ---- */}
          <div style={{ width: 200, background: '#faf9f5', borderRight: '1px solid #e8e6dc', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
            {/* Logo */}
            <div style={{ padding: '12px 16px 8px', borderBottom: '1px solid #e8e6dc' }}>
              <span style={{ fontSize: 18, fontWeight: 700, color: '#d97757' }}>Slides</span>
              <span style={{ fontSize: 12, color: '#b0aea5', marginLeft: 6 }}>v4</span>
            </div>

            {/* Slide list */}
            <div style={{ flex: 1, overflowY: 'auto', padding: '8px' }}>
              {slides.map((slide, idx) => (
                <div
                  key={slide.id}
                  onClick={() => setCurrentIndex(idx)}
                  style={{
                    marginBottom: 8,
                    cursor: 'pointer',
                    borderRadius: 8,
                    border: idx === currentIndex ? '2px solid #d97757' : '2px solid transparent',
                    overflow: 'hidden',
                    background: '#fff',
                    position: 'relative',
                  }}
                >
                  {/* Slide number — pill badge */}
                  <div style={{ position: 'absolute', top: 4, left: 4, fontSize: 9, color: '#fff', fontWeight: 600, zIndex: 2, background: 'rgba(0,0,0,0.45)', borderRadius: 4, padding: '1px 5px', lineHeight: '16px' }}>{idx + 1}</div>
                  {/* Thumbnail via scale */}
                  <div style={{ width: 180, height: 101, overflow: 'hidden', position: 'relative' }}>
                    <div
                      style={{
                        width: CANVAS_W,
                        height: CANVAS_H,
                        transform: `scale(${180 / CANVAS_W})`,
                        transformOrigin: 'top left',
                        pointerEvents: 'none',
                      }}
                      dangerouslySetInnerHTML={{ __html: slide.html }}
                    />
                  </div>
                </div>
              ))}
            </div>

            {/* Sidebar actions */}
            <div style={{ padding: 8, borderTop: '1px solid #e8e6dc', display: 'flex', flexDirection: 'column', gap: 4 }}>
              <button onClick={addSlide} style={{ padding: '6px 0', fontSize: 13, background: '#d97757', color: '#fff', border: 'none', borderRadius: 6, cursor: 'pointer', fontWeight: 500 }} title="添加新页面">+ 添加页面</button>
            </div>
          </div>

          {/* ---- Main Area ---- */}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

            {/* Toolbar */}
            <div style={{ height: 48, background: '#faf9f5', borderBottom: '1px solid #e8e6dc', display: 'flex', alignItems: 'center', padding: '0 16px', gap: 8 }}>
              {/* Undo/Redo */}
              <button onClick={undo} style={btnStyle} title="撤销 (Ctrl+Z)">↩</button>
              <button onClick={redo} style={btnStyle} title="重做 (Ctrl+Shift+Z)">↪</button>

              <div style={{ width: 1, height: 20, background: '#e8e6dc', margin: '0 4px' }} />

              {/* Slide management */}
              <button onClick={() => moveSlide(currentIndex, -1)} disabled={currentIndex === 0} style={{ ...btnStyle, opacity: currentIndex === 0 ? 0.3 : 1 }} title="上移页面">↑</button>
              <button onClick={() => moveSlide(currentIndex, 1)} disabled={currentIndex === slides.length - 1} style={{ ...btnStyle, opacity: currentIndex === slides.length - 1 ? 0.3 : 1 }} title="下移页面">↓</button>
              <button onClick={() => deleteSlide(currentIndex)} disabled={slides.length <= 1} style={{ ...btnStyle, opacity: slides.length <= 1 ? 0.3 : 1 }} title="删除当前页">🗑</button>
              <button onClick={insertImage} style={btnStyle} title="插入图片">🖼</button>
              <button onClick={insertTextBox} style={btnStyle} title="新建文本框">T</button>

              <div style={{ flex: 1 }} />

              {/* Page info */}
              <span style={{ fontSize: 13, color: '#b0aea5' }}>{currentIndex + 1} / {slides.length}</span>

              <div style={{ flex: 1 }} />

              {/* Actions */}
              <button onClick={importFile} style={btnStyle} title="导入 HTML / .lasca / PPTX / JSON">导入</button>
              <button onClick={exportLasca} style={btnStyle} title="导出 .lasca (HTML)">导出</button>
              <button onClick={exportJson} style={{ ...btnStyle, fontSize: 11, padding: '5px 8px', color: '#b0aea5' }} title="导出 JSON">JSON</button>
              <button onClick={exportPdf} disabled={isPdfExporting} style={{ ...btnStyle, background: isPdfExporting ? '#b0aea5' : '#141413', color: '#fff' }} title="导出 PDF">
                {isPdfExporting ? '导出中...' : 'PDF'}
              </button>
              <button onClick={() => { setPresMode('full'); setIsPresenting(true); }} style={{ ...btnStyle, background: '#d97757', color: '#fff', fontWeight: 600 }} title="全屏演示">▶ 演示</button>
              <button onClick={() => { setPresMode('presenter'); setIsPresenting(true); }} style={{ ...btnStyle, background: '#555', color: '#fff' }} title="演讲者视图">🖥 讲者</button>
            </div>

            {/* Per-page action log — compact, older items fade */}
            {currentSlideActions.length > 0 && (
              <div style={{
                overflow: 'hidden',
                background: '#f5f4ef', borderBottom: '1px solid #e8e6dc',
                padding: '5px 16px', flexShrink: 0,
                display: 'flex', alignItems: 'center', gap: 8,
              }}>
                <span style={{ fontSize: 10, color: '#b0aea5', flexShrink: 0, fontWeight: 500 }}>
                  第{currentIndex + 1}页
                </span>
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', flex: 1, overflow: 'hidden' }}>
                  {currentSlideActions.slice(-4).map((a, i, arr) => {
                    const age = arr.length - 1 - i; // 0 = newest
                    const opacity = age === 0 ? 1 : age === 1 ? 0.6 : 0.3;
                    return (
                      <div key={a.id} style={{
                        display: 'flex', alignItems: 'center', gap: 4,
                        opacity, transition: 'opacity 0.5s',
                      }}>
                        <div style={{ width: 4, height: 4, borderRadius: '50%', background: a.color, flexShrink: 0 }} />
                        <span style={{ fontSize: 11, color: '#8a8880', whiteSpace: 'nowrap' }}>{a.text}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Canvas */}
            <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24, overflow: 'hidden', position: 'relative' }}>
              <SlideCanvas
                key={currentSlide.id}
                ref={canvasRef}
                html={currentSlide.html}
                onBlur={syncSlideHtml}
                onMouseDown={handleCanvasMouseDown}
                onMouseMove={handleCanvasHover}
                onDoubleClick={handleCanvasDblClick}
                onContextMenu={handleCanvasContextMenu}
                cursor='default'
              />
              {/* Alignment guide lines */}
              {guides.length > 0 && canvasRef.current && (() => {
                const cr = canvasRef.current.getBoundingClientRect();
                const pr = canvasRef.current.parentElement.getBoundingClientRect();
                const offX = cr.left - pr.left;
                const offY = cr.top - pr.top;
                return guides.map((g, i) => {
                  const isCenter = Math.abs(g.pos - (g.type === 'v' ? CANVAS_W / 2 : CANVAS_H / 2)) < 2;
                  const color = isCenter ? '#d97757' : '#6a9bcc';
                  if (g.type === 'v') {
                    return <div key={`g-${i}`} style={{
                      position: 'absolute', left: offX + g.pos, top: offY, width: 1, height: CANVAS_H,
                      background: color, opacity: 0.7, pointerEvents: 'none', zIndex: 50,
                    }} />;
                  } else {
                    return <div key={`g-${i}`} style={{
                      position: 'absolute', left: offX, top: offY + g.pos, width: CANVAS_W, height: 1,
