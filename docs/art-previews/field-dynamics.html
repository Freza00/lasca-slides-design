<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Dynamics — Analyst Mist</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0; background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px); padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20,20,19,0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 {
            font-family: 'Lora', serif; font-size: 24px; font-weight: 500;
            color: var(--anthropic-dark); margin-bottom: 8px;
        }
        .sidebar .subtitle {
            color: var(--anthropic-mid-gray); font-size: 14px;
            margin-bottom: 32px; line-height: 1.4;
        }
        .control-section { margin-bottom: 32px; }
        .control-section h3 {
            font-size: 16px; font-weight: 600; color: var(--anthropic-dark);
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        }
        .control-section h3::before {
            content: '•'; color: var(--anthropic-orange); font-weight: bold;
        }
        .seed-input {
            width: 100%; background: var(--anthropic-light); padding: 12px;
            border-radius: 8px; font-family: 'Courier New', monospace;
            font-size: 14px; margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray); text-align: center;
        }
        .seed-input:focus {
            outline: none; border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217,119,87,0.1); background: white;
        }
        .seed-controls {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 8px; margin-bottom: 8px;
        }
        .regen-button { margin-bottom: 0; }
        .control-group { margin-bottom: 20px; }
        .control-group label {
            display: block; font-size: 14px; font-weight: 500;
            color: var(--anthropic-dark); margin-bottom: 8px;
        }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] {
            flex: 1; height: 4px; background: var(--anthropic-light-gray);
            border-radius: 2px; outline: none; -webkit-appearance: none;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px;
            background: var(--anthropic-orange); border-radius: 50%;
            cursor: pointer; transition: all 0.2s ease;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1); background: #c86641;
        }
        .value-display {
            font-family: 'Courier New', monospace; font-size: 12px;
            color: var(--anthropic-mid-gray); min-width: 60px; text-align: right;
        }
        .color-group { margin-bottom: 16px; }
        .color-group label {
            display: block; font-size: 12px;
            color: var(--anthropic-mid-gray); margin-bottom: 4px;
        }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] {
            width: 32px; height: 32px; border: none;
            border-radius: 6px; cursor: pointer; background: none; padding: 0;
        }
        .color-value {
            font-family: 'Courier New', monospace; font-size: 12px;
            color: var(--anthropic-mid-gray);
        }
        .button {
            background: var(--anthropic-orange); color: white; border: none;
            padding: 10px 16px; border-radius: 6px; font-size: 14px;
            font-weight: 500; cursor: pointer; transition: all 0.2s ease;
            width: 100%;
        }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area {
            flex: 1; display: flex; align-items: center;
            justify-content: center; min-width: 0;
        }
        #canvas-container {
            width: 100%; max-width: 1000px; border-radius: 12px;
            overflow: hidden; box-shadow: 0 20px 40px rgba(20,20,19,0.1);
            background: white;
        }
        #canvas-container canvas {
            display: block; width: 100% !important; height: auto !important;
        }
        .loading {
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: var(--anthropic-mid-gray);
        }
        @media (max-width: 600px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
            .canvas-area { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Field Dynamics</h1>
            <div class="subtitle">Invisible forces made visible through their effects on matter. Reference: a recent institutional brand refresh.</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Inner Band — dense near-field arcs</label>
                    <div class="slider-container">
                        <input type="range" id="innerArcs" min="3" max="12" step="1" value="7" oninput="updateParam('innerArcs', this.value)">
                        <span class="value-display" id="innerArcs-value">7</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Focal Band — hero band where eye rests</label>
                    <div class="slider-container">
                        <input type="range" id="focalArcs" min="3" max="8" step="1" value="5" oninput="updateParam('focalArcs', this.value)">
                        <span class="value-display" id="focalArcs-value">5</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Outer Band — whisper arcs</label>
                    <div class="slider-container">
                        <input type="range" id="outerArcs" min="0" max="8" step="1" value="4" oninput="updateParam('outerArcs', this.value)">
                        <span class="value-display" id="outerArcs-value">4</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Origin Distance (×diagonal)</label>
                    <div class="slider-container">
                        <input type="range" id="originDist" min="0.05" max="0.35" step="0.01" value="0.15" oninput="updateParam('originDist', this.value)">
                        <span class="value-display" id="originDist-value">0.15</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Focal Radius (×diagonal)</label>
                    <div class="slider-container">
                        <input type="range" id="focalR" min="0.5" max="1.1" step="0.02" value="0.76" oninput="updateParam('focalR', this.value)">
                        <span class="value-display" id="focalR-value">0.76</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Hero Stroke Width</label>
                    <div class="slider-container">
                        <input type="range" id="heroStroke" min="1" max="5" step="0.1" value="2.2" oninput="updateParam('heroStroke', this.value)">
                        <span class="value-display" id="heroStroke-value">2.2</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors — editorial institutional palette</h3>
                <div class="color-group">
                    <label>Background (Cool Mist)</label>
                    <div class="color-picker-container">
                        <input type="color" id="colBg" value="#f0f2f6" onchange="updateColor('colBg', this.value)">
                        <span class="color-value" id="colBg-value">#f0f2f6</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Primary (Deep Blue)</label>
                    <div class="color-picker-container">
                        <input type="color" id="colPrimary" value="#051C2C" onchange="updateColor('colPrimary', this.value)">
                        <span class="color-value" id="colPrimary-value">#051C2C</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Accent (Vivid Blue)</label>
                    <div class="color-picker-container">
                        <input type="color" id="colAccent" value="#2251FF" onchange="updateColor('colAccent', this.value)">
                        <span class="color-value" id="colAccent-value">#2251FF</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Silver (Far-field fade)</label>
                    <div class="color-picker-container">
                        <input type="color" id="colSilver" value="#a5b5d0" onchange="updateColor('colSilver', this.value)">
                        <span class="color-value" id="colSilver-value">#a5b5d0</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing Field Dynamics…</div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════════
        // FIELD DYNAMICS — concentric arc field
        // ═══════════════════════════════════════════════════════════════════════

        let params = {
            seed: 12345,
            innerArcs: 7,     // near-field dense band
            focalArcs: 5,     // middle hero band
            outerArcs: 4,     // far-field whisper band
            originDist: 0.15, // origin position relative to diagonal
            focalR: 0.76,     // focal radius as fraction of diagonal
            heroStroke: 2.2,  // hero arc stroke width
            colors: {
                bg:      '#f0f2f6',
                primary: '#051C2C',
                accent:  '#2251FF',
                silver:  '#a5b5d0',
            },
        };
        let defaultParams = JSON.parse(JSON.stringify(params));

        // Deterministic hex-lerp for color gradation between bands.
        function hexLerp(a, b, k) {
            const h = (s) => [parseInt(s.slice(1, 3), 16), parseInt(s.slice(3, 5), 16), parseInt(s.slice(5, 7), 16)];
            const ah = h(a), bh = h(b);
            const r = Math.round(ah[0] + (bh[0] - ah[0]) * k);
            const g = Math.round(ah[1] + (bh[1] - ah[1]) * k);
            const bl = Math.round(ah[2] + (bh[2] - ah[2]) * k);
            return '#' + [r, g, bl].map(v => v.toString(16).padStart(2, '0')).join('');
        }

        function setup() {
            let canvas = createCanvas(1000, 600);
            canvas.parent('canvas-container');
            noLoop();
            document.querySelector('.loading').style.display = 'none';
            drawField();
        }

        // Each draw() redraw composes the entire field deterministically from the seed.
        function draw() { drawField(); }

        function drawField() {
            randomSeed(params.seed);
            noiseSeed(params.seed);

            // Ground: cool-mist field. The "paper" the forces act on.
            background(params.colors.bg);

            const diag = Math.hypot(width, height);

            // Origin: just beyond the top-left corner. Seeded jitter within the
            // authored quadrant keeps each composition unique but never
            // off-brand. This is the unseen force-center.
            const ox = -width * (params.originDist * (0.4 + random(0.6)));
            const oy = -height * (params.originDist * (0.5 + random(0.8)));

            // Pre-compute the three bands' radii ranges around the focal point.
            const focal = diag * params.focalR;
            const innerRange = [diag * 0.36, focal - diag * 0.04];
            const focalRange = [focal - diag * 0.10, focal + diag * 0.10];
            const outerRange = [focal + diag * 0.14, diag * 1.35];

            noFill();
            strokeJoin(ROUND);
            strokeCap(ROUND);

            // ── BAND A: INNER DENSE ───────────────────────────────────────
            // Near-origin rhythm. Primary deep-blue, thin hairlines, tight.
            for (let i = 0; i < params.innerArcs; i++) {
                const t = i / Math.max(1, params.innerArcs - 1);
                const r = lerp(innerRange[0], innerRange[1], easeOutQuad(t));
                const col = hexLerp(params.colors.primary, params.colors.accent, 0.25 * t);
                const alpha = 0.38 + 0.2 * t;
                stroke(tint(col, alpha));
                strokeWeight(0.7 + 0.25 * (1 - t));
                drawArc(ox, oy, r);
            }

            // ── BAND B: FOCAL ─────────────────────────────────────────────
            // The hero band where the eye rests. Vivid accent blue, slightly
            // thicker strokes, higher opacity. One dominant stroke at center.
            for (let i = 0; i < params.focalArcs; i++) {
                const t = i / Math.max(1, params.focalArcs - 1);
                const r = lerp(focalRange[0], focalRange[1], t);
                const distToHero = Math.abs(t - 0.5);
                // Hero at center of focal band; flanks fade slightly.
                const col = hexLerp(params.colors.accent, params.colors.silver, distToHero * 0.8);
                const alpha = 0.55 + 0.3 * (1 - distToHero * 2);
                const weight = 0.9 + 0.6 * (1 - distToHero * 2);
                stroke(tint(col, alpha));
                strokeWeight(weight);
                drawArc(ox, oy, r);
            }
            // The single HERO arc — slightly thicker, fully saturated accent.
            // This is the compositional anchor.
            stroke(tint(params.colors.accent, 0.95));
            strokeWeight(params.heroStroke);
            drawArc(ox, oy, focal);

            // ── BAND C: OUTER WHISPER ─────────────────────────────────────
            // Far-field silver, barely grazes the canvas corner. Evidence that
            // the field extends infinitely. Sparse, almost invisible.
            for (let i = 0; i < params.outerArcs; i++) {
                const t = i / Math.max(1, params.outerArcs - 1);
                const r = lerp(outerRange[0], outerRange[1], t);
                stroke(tint(params.colors.silver, 0.18 - 0.04 * t));
                strokeWeight(0.5);
                drawArc(ox, oy, r);
            }
        }

        // Stroke a full circle at (cx,cy) with radius r. Only the portion that
        // falls within the canvas is visible — the origin being off-canvas is
        // what makes each circle read as an arc, not a disc.
        function drawArc(cx, cy, r) {
            ellipse(cx, cy, r * 2, r * 2);
        }

        // easeOutQuad: denser near origin (small t), sparser far (large t)
        function easeOutQuad(t) { return t * (2 - t); }

        // Helper: p5 color with alpha. Accepts hex + 0-1 alpha.
        function tint(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return color(r, g, b, Math.round(alpha * 255));
        }

        // ═══════════════════════════════════════════════════════════════════════
        // UI HANDLERS
        // ═══════════════════════════════════════════════════════════════════════

        function updateParam(paramName, value) {
            const numeric = Number(value);
            params[paramName] = Number.isInteger(numeric) && !['originDist', 'focalR', 'heroStroke'].includes(paramName)
                ? Math.round(numeric) : numeric;
            const label = document.getElementById(paramName + '-value');
            if (label) label.textContent = value;
            redraw();
        }

        function updateColor(colorId, value) {
            if (colorId === 'colBg') params.colors.bg = value;
            if (colorId === 'colPrimary') params.colors.primary = value;
            if (colorId === 'colAccent') params.colors.accent = value;
            if (colorId === 'colSilver') params.colors.silver = value;
            const label = document.getElementById(colorId + '-value');
            if (label) label.textContent = value;
            redraw();
        }

        // ═══════════════════════════════════════════════════════════════════════
        // SEED CONTROL FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════════

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) { params.seed = newSeed; redraw(); }
            else { updateSeedDisplay(); }
        }

        function previousSeed() { params.seed = Math.max(1, params.seed - 1); updateSeedDisplay(); redraw(); }
        function nextSeed()     { params.seed = params.seed + 1; updateSeedDisplay(); redraw(); }
        function randomSeedAndUpdate() { params.seed = Math.floor(Math.random() * 999999) + 1; updateSeedDisplay(); redraw(); }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));
            document.getElementById('innerArcs').value = params.innerArcs;
            document.getElementById('innerArcs-value').textContent = params.innerArcs;
            document.getElementById('focalArcs').value = params.focalArcs;
            document.getElementById('focalArcs-value').textContent = params.focalArcs;
            document.getElementById('outerArcs').value = params.outerArcs;
            document.getElementById('outerArcs-value').textContent = params.outerArcs;
            document.getElementById('originDist').value = params.originDist;
            document.getElementById('originDist-value').textContent = params.originDist;
            document.getElementById('focalR').value = params.focalR;
            document.getElementById('focalR-value').textContent = params.focalR;
            document.getElementById('heroStroke').value = params.heroStroke;
            document.getElementById('heroStroke-value').textContent = params.heroStroke;
            document.getElementById('colBg').value = params.colors.bg;
            document.getElementById('colBg-value').textContent = params.colors.bg;
            document.getElementById('colPrimary').value = params.colors.primary;
            document.getElementById('colPrimary-value').textContent = params.colors.primary;
            document.getElementById('colAccent').value = params.colors.accent;
            document.getElementById('colAccent-value').textContent = params.colors.accent;
            document.getElementById('colSilver').value = params.colors.silver;
            document.getElementById('colSilver-value').textContent = params.colors.silver;
            updateSeedDisplay();
            redraw();
        }

        window.addEventListener('load', function() { updateSeedDisplay(); });
    </script>
</body>
</html>
